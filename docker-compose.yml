version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: logisched_db_dev
    environment:
      POSTGRES_USER: ${DB_DEV_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_DEV_PASSWORD:-sua_senha_dev_aqui}
      POSTGRES_DB: ${DB_DEV_NAME:-agendamento_db_dev}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    # Acesso externo ao banco em dev (do seu PC para o VPS)
    ports:
      - "5434:5432"    # host:container (use outra porta se 5434 já estiver em uso)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_DEV_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: logisched_backend_dev
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_DEV_USER:-postgres}:${DB_DEV_PASSWORD:-sua_senha_dev_aqui}@db:5432/${DB_DEV_NAME:-agendamento_db_dev}
      SECRET_KEY: ${DEV_SECRET_KEY:-sua_secret_key_dev_aqui}
      DEBUG: "true"
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ADMIN_PASSWORD: "dev26"  # opcional trocar para uma senha dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      # host separado para dev
      - traefik.http.routers.logisched_backend_dev.rule=Host(`hugwcg8c4ssgsg0cko0s484ko.72.61.25.133.sslip.io`)
      - traefik.http.routers.logisched_backend_dev.entrypoints=http,https
      - traefik.http.services.logisched_backend_dev.loadbalancer.server.port=8000
      - coolify.managed=true
      - coolify.proxy=true

volumes:
  postgres_data_dev: